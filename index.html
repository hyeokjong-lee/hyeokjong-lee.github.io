    <script>
        document.getElementById('hamburgerMenu').addEventListener('click', function() {
            toggleMenu();
        })

        function toggleMenu() {
            const x = document.getElementById('mobileMenu');

                x.style.display = 'none';
            } else {
                x.style.display = 'flex';
            }
